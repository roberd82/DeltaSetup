name: Build and Release Installer

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.MD"
      - ".gitignore"

permissions:
  contents: write

env:
  CSPROJ_DIR: DeltaPatcherCLI/DeltaPatcher
  SOLUTION_PATH: DeltaPatcherCLI/DeltaPatcherCLI.sln
  PUBLISH_DIR: DeltaPatcherCLI/DeltaPatcher/bin/Release/net10.0/win-x64/publish
  EXE_NAME: DeltaPatcherCLI.exe
  ARCHIVE_NAME: DeltaPatcherCLI.7z
  ISS_DIR: .
  ISS_FILE: setup.iss
  DOTNET_VERSION: "10.0.x"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        shell: pwsh
        run: dotnet publish "$env:SOLUTION_PATH" -f net10.0 -m:1

      - name: Package exe into 7z archive
        shell: pwsh
        run: |
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          $archivePath = (Join-Path (Resolve-Path $env:ISS_DIR) $env:ARCHIVE_NAME)
          Push-Location $env:PUBLISH_DIR
          & $sevenZip a -mx=9 $archivePath $env:EXE_NAME
          Pop-Location

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile installer
        shell: pwsh
        run: ISCC.exe "$env:ISS_DIR/$env:ISS_FILE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup
          path: ${{ env.ISS_DIR }}/Output/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move "latest" tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin :refs/tags/latest || true
          git push origin latest

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: setup
          path: dist

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
